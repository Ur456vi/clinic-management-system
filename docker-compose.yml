services:
  postgres:
    image: postgres:16-alpine
    container_name: vyara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vyara}
      POSTGRES_USER: ${POSTGRES_USER:-vyara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vyara_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vyara_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vyara} -d ${POSTGRES_DB:-vyara}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional Postgres admin UI on http://localhost:8080. Enable with: docker compose --profile tools up -d
  adminer:
    image: adminer:4.8.1
    container_name: vyara-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  vyara_postgres_data:
    name: vyara_postgres_data
