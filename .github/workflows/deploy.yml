name: Deploy to EC2 (vyara-dev)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          SMTP_USER: ${{ secrets.UAT_SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.UAT_SMTP_PASSWORD }}
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write the key with a guaranteed trailing newline — `echo` can omit
          # it, which makes ssh reject the key as "invalid format" downstream.
          printf '%s\n' "${{ secrets.EC2_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Best-effort host-key pinning. ssh-keyscan exits non-zero — and under
          # `bash -e` fails the whole step — when the runner can't reach the host
          # (e.g. the EC2 security group doesn't allow the GitHub runner's IP).
          # rsync/ssh below use StrictHostKeyChecking=no, so this must not be fatal.
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy .next build to EC2
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            .next/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/vyara/.next/

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          # Fallback SMTP credentials (Brevo relay). Add these as repo secrets.
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          envs: DATABASE_URL,NEXTAUTH_SECRET,NEXTAUTH_URL,NEXT_PUBLIC_APP_URL,SMTP_USER,SMTP_PASSWORD
          script: |
            set -e
            APP_DIR=/home/ec2-user/vyara
            cd $APP_DIR

            # Write .env from GitHub secrets + hardcoded UAT domain.
            # SMTP host/port/from are non-secret config; user + password come
            # from repo secrets (UAT_SMTP_USER / UAT_SMTP_PASSWORD).
            printf "DATABASE_URL=%s\nNEXTAUTH_SECRET=%s\nNEXTAUTH_URL=https://dryuvraajsingh.com\nNEXT_PUBLIC_APP_URL=https://vyara.algoborne.com\nSMTP_HOST=smtp-relay.brevo.com\nSMTP_PORT=587\nSMTP_FROM_NAME=Dr. Yuvraaj Singh M.D.\nSMTP_FROM_EMAIL=no-reply@dryuvraajsingh.com\nSMTP_USER=%s\nSMTP_PASSWORD=%s\n" \
              "${DATABASE_URL}" "${NEXTAUTH_SECRET}" "${SMTP_USER}" "${SMTP_PASSWORD}" > .env
            chmod 600 .env

            # Install dependencies using the project's own node_modules (Prisma 6)
            npm install --omit=dev

            # Run Prisma migrations using local installed version (not npx which pulls latest)
            npm run prisma:deploy

            # --- TLS (Let's Encrypt) + Nginx ---------------------------------
            # Ensure a valid cert exists on EVERY deploy, idempotently. We do NOT
            # force a brand-new cert each run (Let's Encrypt rate-limits 5 identical
            # certs/week): we obtain one the first time, then renew only when it is
            # within 30 days of expiry. certbot also installs a renewal timer.
            DOMAIN=dryuvraajsingh.com
            CERTBOT_EMAIL=admin@dryuvraajsingh.com

            # certbot + nginx plugin (skipped if already installed).
            if ! command -v certbot >/dev/null 2>&1; then
              sudo dnf install -y certbot python3-certbot-nginx \
                || sudo yum install -y certbot python3-certbot-nginx
            fi

            if [ ! -f /etc/letsencrypt/live/dryuvraajsingh.com/fullchain.pem ]; then
              # No cert yet: stand up an HTTP-only vhost so `nginx -t` passes and
              # port 80 can answer the ACME http-01 challenge, then issue the cert.
              sudo tee /etc/nginx/conf.d/vyara.conf > /dev/null <<'NGINXHTTP'
            server {
                listen 80;
                server_name dryuvraajsingh.com;
                location / { proxy_pass http://127.0.0.1:3000; }
            }
            NGINXHTTP
              sudo nginx -t && sudo systemctl reload nginx
              sudo certbot certonly --nginx -d "$DOMAIN" \
                --non-interactive --agree-tos -m "$CERTBOT_EMAIL" --keep-until-expiring
            else
              # Cert present: renew only if it is near expiry (no-op otherwise).
              sudo certbot renew --quiet || true
            fi

            # Cert is now guaranteed to exist -> write the full HTTPS vhost.
            sudo tee /etc/nginx/conf.d/vyara.conf > /dev/null <<'NGINXCONF'
            server {
                listen 80;
                server_name dryuvraajsingh.com;
                return 301 https://$host$request_uri;
            }

            server {
                listen 443 ssl;
                server_name dryuvraajsingh.com;

                ssl_certificate /etc/letsencrypt/live/dryuvraajsingh.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/dryuvraajsingh.com/privkey.pem;

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINXCONF

            # Test and reload Nginx
            sudo nginx -t && sudo systemctl reload nginx

            # Always delete and re-create PM2 process to pick up fresh .env
            pm2 delete vyara-uat || true
            pm2 start npm --name vyara-uat -- start

            pm2 save
            echo "UAT Deploy complete! Live at https://dryuvraajsingh.com"
