name: Deploy to EC2 (vyara-dev)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            APP_DIR=/home/ec2-user/vyara

            echo '=== Setting up app directory ==='
            mkdir -p $APP_DIR && cd $APP_DIR

            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/Ur456vi/clinic-management-system.git
            fi

            git fetch origin main
            git reset --hard origin/main

            echo '=== Installing production dependencies ==='
            npm ci --omit=dev --prefer-offline 2>/dev/null || npm install --omit=dev

            echo '=== Generating Prisma client ==='
            npm run prisma:generate

            echo '=== Syncing DB schema ==='
            npx prisma db push --accept-data-loss

            echo '=== Running seed (one-time) ==='
            if [ ! -f /home/ec2-user/.vyara_seeded ]; then
              npm run prisma:seed
              touch /home/ec2-user/.vyara_seeded
              echo 'Seed done.'
            else
              echo 'Seed skipped.'
            fi

            
            if [ ! -f /etc/nginx/conf.d/vyara.conf ]; then
              printf 'server {\n    listen 80;\n    server_name _;\n\n    location / {\n        proxy_pass http://127.0.0.1:3000;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection upgrade;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_cache_bypass $http_upgrade;\n    }\n}\n' | sudo tee /etc/nginx/conf.d/vyara.conf
              sudo nginx -t && sudo systemctl enable nginx && sudo systemctl restart nginx
            fi

            echo '=== Restarting app with PM2 ==='
            cd $APP_DIR
            if pm2 describe vyara-dev > /dev/null 2>&1; then
              pm2 restart vyara-dev
            else
              pm2 start npm --name vyara-dev -- start
            fi
            pm2 save
            echo '=== Deploy complete ==='
