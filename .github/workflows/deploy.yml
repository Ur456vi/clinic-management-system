name: Deploy to EC2 (vyara-dev)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy .next build to EC2
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            .next/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/vyara/.next/

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          envs: DATABASE_URL,NEXTAUTH_SECRET,NEXTAUTH_URL,NEXT_PUBLIC_APP_URL
          script: |
            set -e
            APP_DIR=/home/ec2-user/vyara

            mkdir -p $APP_DIR && cd $APP_DIR

            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/Ur456vi/clinic-management-system.git
            fi

            git fetch origin main
            git reset --hard origin/main

            # Overwrite .env from GH secrets — single source of truth
            printf "DATABASE_URL=%s\nNEXTAUTH_SECRET=%s\nNEXTAUTH_URL=%s\nNEXT_PUBLIC_APP_URL=%s\n" \
              "${DATABASE_URL}" "${NEXTAUTH_SECRET}" "${NEXTAUTH_URL}" "${NEXT_PUBLIC_APP_URL}" > .env
            chmod 600 .env

            if [ ! -f /home/ec2-user/.vyara_seeded ]; then
              echo "Running seed..."
              npm run db:seed && touch /home/ec2-user/.vyara_seeded
              echo "Seed complete."
            else
              echo "Seed already ran, skipping."
            fi

            if pm2 list | grep -q "vyara-dev"; then
              pm2 restart vyara-dev
            else
              pm2 start npm --name vyara-dev -- start
            fi

            pm2 save
            echo "Deploy complete!"
