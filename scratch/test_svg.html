<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #FAF8F3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo {
      width: 40px;
      height: 40px;
      color: #7A2329;
    }
    .text {
      color: #7A2329;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.22em;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Central leaf -->
      <path d="M 12 3 C 14 7, 14 15, 12 21 C 10 15, 10 7, 12 3 Z" />

      <!-- Inner right -->
      <path d="M 12 19 C 14 16, 18 12.5, 18.5 8 C 16.5 8.5, 13.5 12, 12 16.5 Z" />

      <!-- Inner left -->
      <path d="M 12 19 C 10 16, 6 12.5, 5.5 8 C 7.5 8.5, 10.5 12, 12 16.5 Z" />

      <!-- Outer right -->
      <path d="M 12 20 C 16 18, 21.5 15, 22 12.5 C 19.5 13, 15 16, 12 18.5 Z" />

      <!-- Outer left -->
      <path d="M 12 20 C 8 18, 2.5 15, 2 12.5 C 4.5 13, 9 16, 12 18.5 Z" />
    </svg>
    <div class="text">METABOLIC HEALTH PROGRAM</div>
  </div>
</body>
</html>
