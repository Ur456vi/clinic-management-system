        "201": { description: Created }
  /api/treatment-plans/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [TreatmentPlans]
      operationId: getTreatmentPlan
      responses:
        "200": { description: OK }
