  /api/invoices/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Invoices]
      operationId: getInvoice
      responses:
        "200": { description: OK }
    patch:
      tags: [Invoices]
