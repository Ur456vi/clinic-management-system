openapi: 3.1.0
info:
  title: Vyara API
  version: 0.1.0
  summary: Vyara clinic-management backend — Sprint 1 surface.
  description: |
    Machine-readable contract for the Vyara backend as shipped to `main` at
    the end of Sprint 1 Day 2. Source of truth for this spec is the code in
    `app/api/**` together with `docs/api-reference.md`. When the two
    diverge, `docs/api-reference.md` wins for prose and this file wins for
    wire shapes.

    Conventions (full prose in `docs/api-conventions.md`):

    * Auth is cookie-based: NextAuth JWT in `next-auth.session-token`
      (HttpOnly, SameSite=Lax, Secure in prod), 12-hour TTL. Send
      `credentials: "include"` from the browser.
    * Success responses use a `{ data, ... }` envelope; list endpoints add
      `pagination.next` and a top-level `nextCursor` mirror.
    * Errors use `{ error: { code, message, details? } }`.
    * Dates are ISO 8601 UTC. Enums are SCREAMING_SNAKE_CASE.
    * Pagination is keyset (cursor + limit); `limit` defaults to 20, max 100.

    See [`/swagger`](/swagger) for an interactive playground served from
    this same spec.
  contact:
    name: Vyara Backend
    email: backend@vyara.local
  license:
    name: Proprietary
servers:
  - url: http://localhost:3000
    description: Local dev (default)
  - url: "{baseUrl}"
    description: Configured (override via baseUrl variable)
    variables:
      baseUrl:
        default: http://localhost:3000
        description: Override to point at any environment.
tags:
  - name: Health
    description: Liveness probes (anonymous).
  - name: Auth
    description: |
      NextAuth credentials login and the email-OTP password-reset flow.
      See the [NextAuth documentation](https://next-auth.js.org/) for the
      surrounding session, CSRF, and sign-out routes.
  - name: Patients
    description: Patient CRUD, search, and soft-delete.
  - name: Consultations
    description: |
      Polymorphic clinical encounters (`RMO` intake / `MAIN` doctor pass).
      The PATCH endpoint is the autosave path for the consultation form.
  - name: Departments
    description: Clinic department directory + default service pricing (BE-31).
  - name: Staff
    description: Doctor + clinical staff directory and CRUD (BE-14).
  - name: Appointments
    description: |
      Appointment scheduling — staff-side CRUD plus the BE-23
      patient-self-book + availability endpoints used by the patient
      portal booking widget.
  - name: TreatmentPlans
    description: |
      Doctor-authored treatment plans (BE-24). Signing a plan auto-
      materializes recurring `Appointment` rows via BE-29.
  - name: LabResults
    description: |
      LabResult model + per-panel analyte JSON (BE-16) and PDF attachment
      upload/download (BE-20) keyed off the BE-19 presigned-URL service.
  - name: InfusionLogs
    description: |
      Integrative-medicine infusion sessions with explicit state machine
      (BE-26).
  - name: Invoices
    description: Invoice + InvoiceItem + Payment CRUD (BE-37).
  - name: Payments
    description: |
      Razorpay-mock checkout integration (BE-41). Mock mode for Sprint 1;
      real Razorpay live keys land in Sprint 2.
  - name: Files
    description: |
      S3 presigned-URL upload + download endpoints (BE-19). The PHI
      bucket holds patient-identifying uploads; the assets bucket holds
      public images.
  - name: Notifications
    description: |
      In-app notification feed for both staff and patients (BE-45).
      Service-layer emitters drop into this feed via `emitNotification`.
  - name: AuditLogs
    description: |
      Admin-only audit-log viewer (BE-23-audit-log-infra). Every domain
      mutation writes an AuditLog row via the service layer.

security:
  - sessionCookie: []

paths:
  # -------------------------------------------------------------------------
  # Health
  # -------------------------------------------------------------------------
  /api/health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Liveness probe
      description: |
        Returns `{ status, time, version }`. Safe for uptime monitors and
        load-balancer healthchecks. Anonymous.
      security: []
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Health"
              example:
                data:
                  status: ok
                  time: "2026-05-14T09:00:00.000Z"
                  version: "0.1.0"

  # -------------------------------------------------------------------------
  # Auth — NextAuth credentials login
  # -------------------------------------------------------------------------
  /api/auth/callback/credentials:
    post:
      tags: [Auth]
      operationId: signInCredentials
      summary: NextAuth credentials sign-in
      description: |
        NextAuth's built-in credentials callback. The FE typically calls
        this via `signIn("credentials", { ... })` from `next-auth/react`
        rather than hand-rolling a fetch — that helper handles CSRF
        token retrieval and the cookie dance.

        See the [NextAuth credentials provider
        docs](https://next-auth.js.org/providers/credentials) for the
        full lifecycle. This endpoint is documented here only for FE
        integrators who want to call it directly.

        On success the server sets `Set-Cookie:
        next-auth.session-token=...` (HttpOnly, SameSite=Lax, Secure in
        prod) with a 12-hour TTL, and returns `{ url }` pointing at the
        configured callback URL. On failure NextAuth redirects to
        `/login?error=CredentialsSignin` and the helper surfaces
        `{ ok: false, error: "CredentialsSignin" }`.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, password, csrfToken]
              properties:
                email:
                  type: string
                  format: email
                  description: Trimmed + lowercased server-side.
                  example: dr.yuvraaj@example.com
                password:
                  type: string
                  format: password
                  description: Plain text; verified with bcrypt cost 12.
                  example: Demo@123
                csrfToken:
                  type: string
                  description: Fetch from `GET /api/auth/csrf`.
      responses:
        "200":
          description: |
            Sign-in succeeded. `Set-Cookie` header carries the session
            token. Response body is NextAuth's default `{ url }` shape.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "next-auth.session-token=eyJhbGciOi...; Path=/; HttpOnly; SameSite=Lax"
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                    example: http://localhost:3000/doctor
        "302":
          description: |
            NextAuth redirects on failure (bad credentials / inactive
            user) — `Location: /login?error=CredentialsSignin`. The
            `next-auth/react` helper turns this into a non-throwing
            `{ ok: false }` result.
          headers:
            Location:
              schema:
                type: string
                example: "/login?error=CredentialsSignin"

  # -------------------------------------------------------------------------
  # Auth — Password reset (email OTP)
  # -------------------------------------------------------------------------
  /api/auth/password-reset/request:
    post:
      tags: [Auth]
      operationId: passwordResetRequest
      summary: Request an OTP for password reset
      description: |
        Step 1 of the email-OTP reset flow.

        **Always returns 200** when the body parses, regardless of
        whether the email matches a user — this is the
        enumeration-resistance guarantee. If the email maps to an
        active user a 6-digit OTP is generated, bcrypt-hashed, stored
        with a 15-minute TTL, and emailed via Resend (or logged to
        stdout in dev).

        Rate-limit: 5 OTPs per user per rolling hour. Excess requests
        are silently dropped; the caller still sees 200.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: Request accepted (no signal as to whether the email exists).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Ok"
              example:
                data: { ok: true }
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/auth/password-reset/verify:
    post:
      tags: [Auth]
      operationId: passwordResetVerify
      summary: Verify the OTP and exchange it for a reset ticket
      description: |
        Step 2: exchange a 6-digit OTP for a short-lived reset ticket
        (JWT, 5-minute TTL). Pass the ticket back to `confirm`
        verbatim.

        On failure (bad OTP, expired OTP, no OTP issued, attempts
        exhausted) all four cases return the same bland 400 with
        message `Invalid or expired code`. 5 verify attempts per OTP
        row — once exhausted the row is dead even for the correct
        code.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetVerify"
      responses:
        "200":
          description: OTP accepted; ticket issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [ticket]
                        properties:
                          ticket:
                            type: string
                            description: Opaque JWT (HS256). Pass to `confirm` verbatim.
              example:
                data:
                  ticket: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/auth/password-reset/confirm:
    post:
      tags: [Auth]
      operationId: passwordResetConfirm
      summary: Set a new password using a reset ticket
      description: |
        Step 3 (final): set a new password using the ticket from
        `verify`. On success the user's `passwordHash` is updated,
        any other outstanding OTPs for them are invalidated, and a
        `password-reset.confirmed` audit row is written — all
        atomically. The ticket is single-use; replaying it returns the
        bland 400 with message `Invalid or expired reset ticket`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetConfirm"
      responses:
        "200":
          description: Password updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Ok"
              example:
                data: { ok: true }
        "400":
          $ref: "#/components/responses/ValidationError"

  # -------------------------------------------------------------------------
  # Patients
  # -------------------------------------------------------------------------
  /api/patients:
    get:
      tags: [Patients]
      operationId: listPatients
      summary: List, search, filter, and paginate patients
      description: |
        Cursor-paginated list. Short-form params (`q`, `doctorId`,
        `limit`) are canonical; the legacy `search`, `primaryDoctorId`,
        and `take` aliases continue to work and the short form wins
        when both are supplied.

        Ordering is `createdAt DESC, id DESC` (stable, keyset-safe).
        Out-of-range `limit` values clamp silently.

        Response carries both `nextCursor` (BE-12 canonical) and
        `pagination.next` (BE-07 legacy). New code should read
        `nextCursor`. When the end of the list is reached both are
        `null`.

        Default behaviour when `status` is omitted: `ARCHIVED` rows
        are hidden.
      parameters:
        - in: query
          name: q
          description: |
            Case-insensitive substring search across `fullName`,
            `email`, `phone`, `patientNumber`. Alias of legacy
            `search`.
          schema:
            type: string
            maxLength: 200
        - in: query
          name: search
          description: Legacy alias of `q`. `q` wins when both are present.
          schema:
            type: string
            maxLength: 200
        - in: query
          name: status
          description: |
            Comma-separated `PatientStatus` values. When omitted,
            `ARCHIVED` rows are hidden.
          schema:
            type: string
            example: ACTIVE,INACTIVE
        - in: query
          name: doctorId
          description: Filter to patients with this primary doctor. Alias of `primaryDoctorId`.
          schema:
            type: string
            format: uuid
        - in: query
          name: primaryDoctorId
          description: Legacy alias of `doctorId`.
          schema:
            type: string
            format: uuid
        - in: query
          name: cursor
          description: Opaque keyset cursor — the `id` of the last row of the previous page. Omit for page 1.
          schema:
            type: string
        - in: query
          name: limit
          description: Page size, default 20, max 100. Alias of legacy `take`.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: take
          description: Legacy alias of `limit`.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Page of patients.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientList"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Patients]
      operationId: createPatient
      summary: Create a new patient
      description: |
        Creates a patient and assigns `patientNumber` (`PAT-NNNNNN`).
        `patientNumber` currently uses `MAX+1` and can race under
        concurrent inserts — the unique index catches collisions and
        the route returns 409, retry once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientCreate"
      responses:
        "201":
          description: Patient created.
          headers:
            Location:
              schema:
                type: string
              description: URL of the new patient resource.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Patient"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/patients/{id}:
    parameters:
      - $ref: "#/components/parameters/PatientId"
    get:
      tags: [Patients]
      operationId: getPatient
      summary: Fetch one patient
      description: Writes a `READ` audit row server-side.
      responses:
        "200":
          description: Patient found.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Patient"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Patients]
      operationId: updatePatient
      summary: Partial update of a patient
      description: |
        Any subset of the create body plus `status`. Sending `{}` is a
        no-op (an audit row is still written, with an empty diff).

        Setting `primaryDoctorId: null` disconnects the doctor
        relation. Note: clearing other optional fields is done by
        omitting them from the body — sending `null` is currently
        rejected by Zod for non-doctor fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Patient updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Patient"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Patients]
      operationId: softDeletePatient
      summary: Soft-delete a patient
      description: |
        Sets `status = ARCHIVED` and `deletedAt = now()`. The row stays
        in the table so historical consultations and audit trails
        remain referentially intact. Archived patients are hidden from
        the default `GET /api/patients` list; pass `status=ARCHIVED`
        explicitly to see them.
      responses:
        "204":
          description: Deleted (no body).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # -------------------------------------------------------------------------
  # Consultations
  # -------------------------------------------------------------------------
  /api/consultations:
    post:
      tags: [Consultations]
      operationId: createConsultation
      summary: Create a DRAFT consultation
      description: |
        Creates a new `DRAFT` consultation linked to a patient and the
        calling user as author. The `type` discriminator gates the
        role check:

        * `RMO`  — allowed for `ADMIN`, `RMO`, `DOCTOR`.
        * `MAIN` — allowed for `ADMIN`, `DOCTOR`.

        Wrong role → 403. Unknown patient → 404.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultationCreate"
      responses:
        "201":
          description: Consultation created.
          headers:
            Location:
              schema:
                type: string
              description: URL of the new consultation resource.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Consultation"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/consultations/{id}:
    description: |
      Item routes for a single consultation.

      **Role view allow-list (GET):** `ADMIN`, `DOCTOR`, `RMO`,
      `RECEPTION`, `INFUSION_SPECIALIST`, `REHAB_SPECIALIST`,
      `AESTHETICS_SPECIALIST`.

      **Role write allow-list (PATCH):** the same matrix as POST,
      gated by the consultation's `type` (`RMO` => `ADMIN`/`RMO`/`DOCTOR`;
      `MAIN` => `ADMIN`/`DOCTOR`).

      **Status transition matrix (PATCH `status`):**

      | From          | Allowed `next`              |
      | ------------- | --------------------------- |
      | `DRAFT`       | `RMO_DONE`, `IN_PROGRESS`   |
      | `RMO_DONE`    | `IN_PROGRESS`               |
      | `IN_PROGRESS` | `SIGNED`                    |
      | `SIGNED`      | _(terminal — row immutable)_ |

      Any other transition => 400 with message
      `Illegal status transition: <from> -> <to>`.

      **Shallow-merge semantics on `sections`.** A PATCH that sends
      `sections` merges into the existing JSONB at the **top level
      only** — `{ ...existing, ...patch }`. Sending
      `{ sections: { vitals: ... } }` overwrites only `vitals` and
      leaves the other top-level keys alone. To clear a sub-field,
      omit it from the next save; deep-merge is intentionally not
      supported.

      Any PATCH (including no-op `{}`) against a `SIGNED` row returns
      400 with message `Consultation is SIGNED and cannot be modified`.
    parameters:
      - $ref: "#/components/parameters/ConsultationId"
    get:
      tags: [Consultations]
      operationId: getConsultation
      summary: Fetch one consultation
      description: |
        Returns the full consultation row plus embedded `createdBy`
        (id, email, role, staff name) and `patient` summary. Writes a
        `READ` audit row.
      responses:
        "200":
          description: Consultation found.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Consultation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Consultations]
      operationId: updateConsultation
      summary: Partial save (autosave) of a consultation
      description: |
        Autosave endpoint for the consultation form. Every body field
        is optional.

        * `sections` is **shallow-merged** at the top level into the
          existing JSONB.
        * `status` must be a legal transition from the current status
          (see the path-level description for the matrix).
        * `summary` is overwritten verbatim; `null` clears it.

        A SIGNED consultation rejects every PATCH including no-op
        `{}` with a 400. Autosaves race on the JSONB column with
        last-write-wins — debounce on the FE (~750 ms).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultationPatch"
      responses:
        "200":
          description: Consultation updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Consultation"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # -------------------------------------------------------------------------
  # Probes (BE-55)
  # -------------------------------------------------------------------------
  /api/ready:
    get:
      tags: [Health]
      operationId: getReady
      summary: Readiness probe with DB round-trip
      description: |
        Like `/api/health` but additionally performs a `SELECT 1` against
        Postgres so it returns 503 if the DB is unreachable. Anonymous.
      security: []
      responses:
        "200":
          description: Service + DB reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "503":
          description: Service up but DB unreachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # -------------------------------------------------------------------------
  # Departments (BE-12 + BE-31)
  # -------------------------------------------------------------------------
  /api/departments:
    get:
      tags: [Departments]
      operationId: listDepartments
      summary: List departments
      responses:
        "200":
          description: Department list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Departments]
      operationId: createDepartment
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: { type: string }
                slug: { type: string }
                description: { type: string, nullable: true }
                defaultPricing:
                  type: object
                  additionalProperties: { type: integer, description: Price in paise }
                  nullable: true
                isActive: { type: boolean }
      responses:
        "201":
          description: Created.
        "409":
          $ref: "#/components/responses/Conflict"
  /api/departments/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Departments]
      operationId: getDepartment
      summary: Get a department
      responses:
        "200": { description: OK }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Departments]
      operationId: updateDepartment
      summary: Update a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                slug: { type: string }
                description: { type: string, nullable: true }
                defaultPricing:
                  type: object
                  nullable: true
                isActive: { type: boolean }
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      tags: [Departments]
      operationId: archiveDepartment
      summary: Archive a department (soft delete)
      responses:
        "204": { description: Archived }
        "404": { $ref: "#/components/responses/NotFound" }

  # -------------------------------------------------------------------------
  # Staff (BE-14)
  # -------------------------------------------------------------------------
  /api/staff:
    get:
      tags: [Staff]
      operationId: listStaff
      summary: List staff with role + department filters
      parameters:
        - in: query
          name: role
          schema: { $ref: "#/components/schemas/Role" }
        - in: query
          name: departmentId
          schema: { type: string, format: uuid }
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200": { description: Staff list }
    post:
      tags: [Staff]
      operationId: createStaff
      summary: Create a staff member (also mints the User login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, fullName, role]
              properties:
                email: { type: string, format: email }
                fullName: { type: string }
                role: { $ref: "#/components/schemas/Role" }
                phone: { type: string, nullable: true }
                departmentId: { type: string, format: uuid, nullable: true }
                specialization: { type: string }
                qualifications: { type: array, items: { type: string } }
      responses:
        "201": { description: Created }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/staff/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Staff]
      operationId: getStaff
      summary: Get a staff member
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Staff]
      operationId: updateStaff
      summary: Update a staff member
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Staff]
      operationId: deactivateStaff
      summary: Deactivate (soft delete) a staff member
      responses:
        "204": { description: Deactivated }
        "404": { $ref: "#/components/responses/NotFound" }

  # -------------------------------------------------------------------------
  # Appointments (BE-27 + BE-23)
  # -------------------------------------------------------------------------
  /api/appointments:
    get:
      tags: [Appointments]
      operationId: listAppointments
      summary: List appointments with patient/staff/status/window filters
      parameters:
        - in: query
          name: patientId
          schema: { type: string, format: uuid }
        - in: query
          name: staffId
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { type: string, description: "Comma-separated AppointmentStatus list" }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200": { description: Appointment page }
    post:
      tags: [Appointments]
      operationId: createAppointment
      summary: Staff-side create (DOCTOR / RMO / RECEPTION / ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patientId, staffId, startsAt, endsAt]
              properties:
                patientId: { type: string, format: uuid }
                staffId: { type: string, format: uuid }
                departmentId: { type: string, format: uuid, nullable: true }
                startsAt: { type: string, format: date-time }
                endsAt: { type: string, format: date-time }
                reason: { type: string }
                notes: { type: string }
      responses:
        "201": { description: Created }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/appointments/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Appointments]
      operationId: getAppointment
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Appointments]
      operationId: updateAppointment
      summary: Reschedule / update fields on an appointment
      responses:
        "200": { description: OK }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/appointments/{id}/transition:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Appointments]
      operationId: transitionAppointment
      summary: Drive the appointment state machine (REQUESTED → CONFIRMED → ...)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to:
                  type: string
                  enum: [REQUESTED, CONFIRMED, COMPLETED, CANCELLED, NO_SHOW]
                reason: { type: string }
      responses:
        "200": { description: Transitioned }
        "400": { description: Illegal transition }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/appointments/availability:
    get:
      tags: [Appointments]
      operationId: listAvailability
      summary: List free slot windows for a staff member (BE-23)
      parameters:
        - in: query
          name: staffId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: from
          required: true
          schema: { type: string, format: date-time }
        - in: query
          name: to
          required: true
          schema: { type: string, format: date-time }
        - in: query
          name: durationMins
          schema: { type: integer, default: 30, maximum: 240 }
      responses:
        "200":
          description: Free slot list (max 96).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        start: { type: string, format: date-time }
                        end: { type: string, format: date-time }
  /api/appointments/book:
    post:
      tags: [Appointments]
      operationId: bookAppointment
      summary: Patient-self-book or ADMIN/RECEPTION on-behalf book (BE-23)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [staffId, scheduledAt]
              properties:
                patientId:
                  type: string
                  format: uuid
                  description: |
                    Required for ADMIN/RECEPTION on-behalf branch. Omit
                    for patient self-book — derived from session.
                staffId: { type: string, format: uuid }
                scheduledAt: { type: string, format: date-time }
                durationMins: { type: integer, default: 30 }
                reason: { type: string }
                notes: { type: string }
      responses:
        "201": { description: Booked }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

