        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200": { description: AuditLog page }
        "403": { $ref: "#/components/responses/Forbidden" }

# ===========================================================================
# Components
# ===========================================================================
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: |
        NextAuth JWT session cookie. HttpOnly, SameSite=Lax, Secure in
        production, 12-hour TTL. Browsers attach it automatically;
        from `fetch()` use `credentials: "include"`. From
        `next-auth/react` use `signIn("credentials", ...)`.

  parameters:
    PatientId:
      name: id
      in: path
      required: true
      description: Patient UUID.
      schema:
        type: string
        format: uuid
    ConsultationId:
      name: id
      in: path
      required: true
      description: Consultation UUID.
      schema:
        type: string
        format: uuid

  responses:
    ValidationError:
      description: Body or query failed validation, or a domain-rule check (e.g. illegal status transition, PATCH against SIGNED row).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: VALIDATION_ERROR
              message: Request validation failed
              details:
                - path: [body, email]
                  message: Invalid email
    Unauthorized:
      description: No session cookie or session expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: UNAUTHORIZED
              message: Authentication required
    Forbidden:
      description: Signed in but the caller's role is not in the route's allow-list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: FORBIDDEN
              message: Role not permitted
    NotFound:
      description: Resource id is well-formed but no matching row exists.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: NOT_FOUND
              message: Resource not found
    Conflict:
      description: Unique-constraint collision. Rare race; safe to retry.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: CONFLICT
              message: Unique constraint collision

  schemas:
    # -----------------------------------------------------------------
    # Envelopes
    # -----------------------------------------------------------------
    Envelope:
      type: object
      description: Standard success envelope. List endpoints add `pagination` and `nextCursor`.
      required: [data]
      properties:
        data:
          description: Endpoint-specific payload.
    Pagination:
      type: object
      description: Keyset pagination cursor.
      properties:
        next:
          type: [string, "null"]
          description: |
            Cursor for the next page (`id` of the last returned row),
            or `null` at the end of the list.
        total:
          type: integer
          description: Optional. Present only on cheap-to-count lists.
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - RATE_LIMITED
            - INTERNAL_ERROR
          description: Stable machine-readable error code.
        message:
          type: string
          description: Developer-facing message; surface in logs, not in end-user UI.
        details:
          type: array
          description: Optional structured detail (Zod issues, transition info).
          items:
            type: object
            properties:
              path:
                type: array
                items:
                  oneOf:
                    - type: string
                    - type: integer
              message:
                type: string

    Ok:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true

    # -----------------------------------------------------------------
    # Enums
    # -----------------------------------------------------------------
    Role:
      type: string
      description: Staff role enum.
      enum:
        - ADMIN
        - DOCTOR
        - RMO
        - RECEPTION
        - INFUSION_SPECIALIST
        - REHAB_SPECIALIST
        - AESTHETICS_SPECIALIST
    PatientStatus:
      type: string
      enum: [ACTIVE, INACTIVE, ARCHIVED]
    Sex:
      type: string
      enum: [MALE, FEMALE, OTHER, UNDISCLOSED]
    ConsultationType:
      type: string
      enum: [RMO, MAIN]
    ConsultationStatus:
      type: string
      enum: [DRAFT, RMO_DONE, IN_PROGRESS, SIGNED]

    # -----------------------------------------------------------------
    # Health
    # -----------------------------------------------------------------
    Health:
      type: object
      required: [status, time, version]
      properties:
        status:
          type: string
          const: ok
        time:
          type: string
          format: date-time
        version:
          type: string
          description: From `package.json#version`.

    # -----------------------------------------------------------------
    # Password reset bodies
    # -----------------------------------------------------------------
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          description: Trimmed + lowercased server-side.
    PasswordResetVerify:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        otp:
          type: string
          pattern: "^\\d{6}$"
          description: Exactly 6 digits (leading zeros allowed).
    PasswordResetConfirm:
      type: object
      required: [ticket, newPassword]
      properties:
        ticket:
          type: string
          minLength: 1
          description: Opaque JWT from `verify`.
        newPassword:
          type: string
          minLength: 8
          maxLength: 128

    # -----------------------------------------------------------------
    # Patient
    # -----------------------------------------------------------------
    Patient:
      type: object
      required:
        - id
        - patientNumber
        - fullName
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        patientNumber:
          type: string
          example: PAT-000042
          description: Server-assigned. Format `PAT-NNNNNN`.
        fullName:
          type: string
          maxLength: 200
        email:
          type: [string, "null"]
          format: email
          maxLength: 254
        phone:
          type: [string, "null"]
          maxLength: 50
        dateOfBirth:
          type: [string, "null"]
          format: date
          description: ISO 8601 date (no time).
        sex:
          oneOf:
            - $ref: "#/components/schemas/Sex"
            - type: "null"
        status:
          $ref: "#/components/schemas/PatientStatus"
        primaryDoctorId:
          type: [string, "null"]
          format: uuid
          description: FK to Staff with role=DOCTOR.
        userId:
          type: [string, "null"]
          format: uuid
          description: |
            Set only when the patient has self-enrolled for the patient
            portal (BE-47). Clinic-created patients have `null` here.
        occupation:
          type: [string, "null"]
          maxLength: 200
        placeOfResidence:
          type: [string, "null"]
          maxLength: 200
        address:
          type: [string, "null"]
          maxLength: 500
        referralSource:
          type: [string, "null"]
          maxLength: 200
        deletedAt:
          type: [string, "null"]
          format: date-time
          description: Set on soft-delete.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PatientCreate:
      type: object
      required: [fullName]
      properties:
        fullName:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 254
          description: Empty string is treated as absent.
        phone:
          type: string
          maxLength: 50
        dateOfBirth:
          type: string
          format: date
        sex:
          $ref: "#/components/schemas/Sex"
        occupation:
          type: string
          maxLength: 200
        placeOfResidence:
          type: string
          maxLength: 200
        address:
          type: string
          maxLength: 500
        referralSource:
          type: string
          maxLength: 200
        primaryDoctorId:
          type: string
          format: uuid

    PatientUpdate:
      type: object
      description: |
        Partial update. Every field is optional. Sending `{}` is a
        no-op. To clear a non-doctor optional field, omit it (sending
        `null` is currently rejected by Zod). To disconnect the
        primary doctor, send `{ "primaryDoctorId": null }`.
      properties:
        fullName:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 50
        dateOfBirth:
          type: string
          format: date
        sex:
          $ref: "#/components/schemas/Sex"
        occupation:
          type: string
          maxLength: 200
        placeOfResidence:
          type: string
          maxLength: 200
        address:
          type: string
          maxLength: 500
        referralSource:
          type: string
          maxLength: 200
        primaryDoctorId:
          type: [string, "null"]
          format: uuid
        status:
          $ref: "#/components/schemas/PatientStatus"

    PatientList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Patient"
        nextCursor:
          type: [string, "null"]
          description: BE-12 canonical cursor for the next page.
        pagination:
          $ref: "#/components/schemas/Pagination"

    # -----------------------------------------------------------------
    # Consultation
    # -----------------------------------------------------------------
    ConsultationSections:
      type: object
      additionalProperties: true
      description: |
        Free-form JSONB blob. The server validates only that this is a
        JSON object at the top level — sub-field shapes are FE-owned
        until the form contract stabilises.

        For `type=RMO` typical top-level keys are `informant`,
        `demographics`, `medicalHistory`, `socialHistory`,
        `personalHistory`, `examinationSummary`.

        For `type=MAIN` typical keys are `chiefComplaint`, `hpi`,
        `assessment`, `diagnosis`, `plan`.

    ConsultationAuthor:
      type: object
      description: Embedded summary of the consultation's `createdBy` user.
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/Role"
        staff:
          type: [object, "null"]
          properties:
            fullName:
              type: string

    ConsultationPatientSummary:
      type: object
      description: Embedded patient summary on a Consultation response.
      required: [id, patientNumber, fullName, status]
      properties:
        id:
          type: string
          format: uuid
        patientNumber:
          type: string
        fullName:
          type: string
        sex:
          oneOf:
            - $ref: "#/components/schemas/Sex"
            - type: "null"
        dateOfBirth:
          type: [string, "null"]
          format: date
        status:
          $ref: "#/components/schemas/PatientStatus"
        primaryDoctorId:
          type: [string, "null"]
          format: uuid

    Consultation:
      type: object
      required:
        - id
        - patientId
        - type
        - status
        - sections
        - createdById
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        patientId:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/ConsultationType"
        status:
          $ref: "#/components/schemas/ConsultationStatus"
        sections:
          $ref: "#/components/schemas/ConsultationSections"
        summary:
          type: [string, "null"]
          maxLength: 2000
        createdById:
          type: string
          format: uuid
        signedById:
          type: [string, "null"]
          format: uuid
        signedAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          $ref: "#/components/schemas/ConsultationAuthor"
        patient:
          $ref: "#/components/schemas/ConsultationPatientSummary"

    ConsultationCreate:
      type: object
      required: [patientId, type]
      properties:
        patientId:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/ConsultationType"
        sections:
          $ref: "#/components/schemas/ConsultationSections"
        summary:
          type: string
          maxLength: 2000

    ConsultationPatch:
      type: object
      description: |
        Partial save. All fields optional. `sections` shallow-merges
        at the top level; `status` must be a legal transition;
        `summary: null` clears it.
      properties:
        sections:
          $ref: "#/components/schemas/ConsultationSections"
        status:
          $ref: "#/components/schemas/ConsultationStatus"
        summary:
          type: [string, "null"]
          maxLength: 2000
