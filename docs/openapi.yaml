    post:
      tags: [Payments]
      operationId: razorpayWebhook
      summary: Razorpay webhook receiver (HMAC-signed)
      security: []
      description: |
        Webhook endpoint. Trusts Razorpay's HMAC signature, not the
        session cookie. Returns 401 on signature mismatch.
      responses:
        "200": { description: Ack }
        "401": { description: Bad signature }

